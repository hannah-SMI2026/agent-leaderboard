<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:      #ff4757;
      --red-soft: #fff0f1;
      --navy:     #1e2640;
      --navy2:    #252d47;
      --navy3:    #2e3957;
      --blue:     #3b6cf6;
      --text:     #1e2640;
      --muted:    #8e96b0;
      --border:   #eef0f6;
      --bg:       #f4f5fb;
      --white:    #ffffff;
      --gold:     #f59e0b;
      --green:    #22c55e;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ─────────────────────────────────── */
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .sidebar-logo {
      padding: 16px 18px 12px;
      display: flex;
      align-items: center;
    }
.project-selector {
      margin: 0 16px 20px;
      background: var(--navy2);
      border-radius: 10px;
      padding: 9px 14px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer;
    }
    .project-label { font-size: 0.75rem; color: #7c8db5; font-weight: 500; }
    .project-name  { font-size: 0.82rem; color: #fff; font-weight: 600; margin-top: 1px; }
    .project-caret { color: #7c8db5; font-size: 0.7rem; }

    .nav-section {
      padding: 0 12px;
      margin-bottom: 8px;
    }
    .nav-section-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: #4e5e85;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0 10px 8px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      border-radius: 9px;
      font-size: 0.82rem;
      font-weight: 500;
      color: #7c8db5;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }
    .nav-item:hover { background: var(--navy2); color: #b8c4e0; }
    .nav-item.active { background: var(--navy3); color: #fff; font-weight: 600; }
    .nav-item.active .nav-icon { color: var(--red); }
    .nav-icon { font-size: 1rem; width: 18px; text-align: center; }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px 22px;
      border-top: 1px solid var(--navy2);
      display: flex; align-items: center; gap: 10px;
      cursor: pointer;
    }
    .sidebar-footer-icon { font-size: 1rem; color: #7c8db5; }
    .sidebar-footer-text { font-size: 0.8rem; color: #7c8db5; font-weight: 500; }

    /* ── Main ────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── Topbar ──────────────────────────────────── */
    .topbar {
      background: var(--white);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-title {
      font-size: 1.15rem; font-weight: 700;
      display: flex; align-items: center; gap: 10px;
    }
    .topbar-title-icon { color: var(--red); font-size: 1.1rem; }
    .period-pill {
      background: var(--red);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 999px;
      display: flex; align-items: center; gap: 5px;
      cursor: pointer;
      border: none;
      position: relative;
    }
    .period-pill select {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
    }

    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .topbar-icon {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 0.95rem; color: var(--muted);
      transition: background 0.15s;
    }
    .topbar-icon:hover { background: var(--border); }
    .avatar-ring {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--red), #ff8c94);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; color: #fff;
      cursor: pointer;
    }
    .refresh-badge {
      font-size: 0.7rem; color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }
    .pulse-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Content ─────────────────────────────────── */
    .content {
      flex: 1; padding: 24px 28px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 1100px) { .content { grid-template-columns: 1fr; } }

    /* ── Podium section ──────────────────────────── */
    .podium-section { display: flex; flex-direction: column; gap: 20px; }

    .podium-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    @media (max-width: 700px) { .podium-cards { grid-template-columns: 1fr; } }

    .podium-card {
      background: var(--white);
      border-radius: 16px;
      padding: 22px 20px 18px;
      box-shadow: 0 2px 12px rgba(30,38,64,.06);
      display: flex; flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .podium-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(30,38,64,.1); }
    .podium-card.rank-1 { border-top: 3px solid var(--gold); }
    .podium-card.rank-2 { border-top: 3px solid var(--red); }
    .podium-card.rank-3 { border-top: 3px solid var(--blue); }

    .podium-medal {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      font-size: 1.3rem;
    }
    .podium-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 800; color: #fff;
      margin-bottom: 10px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }
    .podium-name { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .podium-badge {
      display: inline-block;
      font-size: 0.65rem; font-weight: 600;
      padding: 3px 9px; border-radius: 999px;
      margin: 5px 0 10px;
    }
    .badge-red    { background: var(--red); color: #fff; }
    .badge-gray   { background: var(--bg); color: var(--muted); }
    .badge-blue   { background: #e8eeff; color: var(--blue); }

    .podium-chart { width: 100%; height: 40px; margin: 6px 0 10px; }

    .podium-stat { font-size: 1.6rem; font-weight: 900; color: var(--text); line-height: 1; }
    .podium-stat-label { font-size: 0.68rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .podium-premium { font-size: 0.8rem; font-weight: 600; color: var(--blue); margin-top: 4px; }

    .podium-actions {
      display: flex; gap: 8px; margin-top: 14px; width: 100%;
    }
    .podium-btn {
      flex: 1; padding: 7px; border-radius: 8px; border: 1.5px solid var(--border);
      font-size: 0.7rem; font-weight: 700; color: var(--muted);
      background: transparent; cursor: pointer; letter-spacing: 0.5px;
      text-transform: uppercase; transition: all 0.15s;
    }
    .podium-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Others table ────────────────────────────── */
    .others-panel {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(30,38,64,.06);
      overflow: hidden;
    }
    .others-header {
      padding: 18px 22px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .others-title { font-size: 1rem; font-weight: 700; }
    .others-actions { display: flex; gap: 10px; }
    .others-action-btn {
      font-size: 0.72rem; font-weight: 600; color: var(--muted);
      background: none; border: none; cursor: pointer; letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: color 0.15s;
    }
    .others-action-btn:hover { color: var(--red); }

    /* ── Rankings list ───────────────────────────── */
    .rank-row {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .rank-row:last-child { border-bottom: none; }
    .rank-row:hover { background: #fafbff; }

    .rank-num {
      width: 28px; flex-shrink: 0; text-align: center;
      font-size: 0.85rem; font-weight: 800; color: var(--muted);
    }
    .rank-num.top1 { color: var(--gold); }
    .rank-num.top2 { color: #94a3b8; }
    .rank-num.top3 { color: #cd7c2f; }

    .rank-avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 800; color: #fff;
    }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name {
      font-size: 0.88rem; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rank-premium { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    .rank-deals { text-align: right; flex-shrink: 0; }
    .rank-deals-num { font-size: 1.1rem; font-weight: 900; color: var(--text); line-height: 1; }
    .rank-deals-lbl { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }

    /* ── Right column ────────────────────────────── */
    .right-col {
      display: flex; flex-direction: column; gap: 16px;
      grid-column: 2;
    }
    .podium-section { grid-column: 1; }

    /* ── Stat cards ──────────────────────────────── */
    .stat-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .stat-card {
      border-radius: 16px;
      padding: 20px 18px;
      display: flex; flex-direction: column;
      justify-content: space-between;
      min-height: 110px;
    }
    .stat-card.red   { background: linear-gradient(135deg, #ff4757, #ff6b78); }
    .stat-card.dark  { background: var(--navy); }

    .stat-card-val {
      font-size: 2rem; font-weight: 900; color: #fff; line-height: 1;
    }
    .stat-card-lbl { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,.65); margin-top: 6px; }

    /* ── Progress ────────────────────────────────── */
    .progress-panel {
      background: var(--white);
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 2px 12px rgba(30,38,64,.06);
    }
    .progress-item { margin-bottom: 14px; }
    .progress-item:last-child { margin-bottom: 0; }
    .progress-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .progress-label { font-size: 0.75rem; font-weight: 600; color: var(--muted); }
    .progress-value { font-size: 0.75rem; font-weight: 700; color: var(--text); }
    .progress-track {
      height: 5px; background: var(--bg); border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 999px; transition: width 0.8s ease;
    }
    .progress-fill.red  { background: var(--red); }
    .progress-fill.blue { background: var(--blue); }
    .progress-sub {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 4px;
    }
    .progress-sub-val { font-size: 0.7rem; color: var(--muted); }

    /* ── News ────────────────────────────────────── */
    .news-panel {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(30,38,64,.06);
      flex: 1;
    }
    .news-header {
      padding: 16px 18px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .news-title { font-size: 0.9rem; font-weight: 700; }
    .news-show-all { font-size: 0.72rem; font-weight: 600; color: var(--red); cursor: pointer; }

    .news-list { padding: 6px 0; }
    .news-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 18px;
      transition: background 0.15s;
    }
    .news-item:hover { background: #fafbff; }
    .news-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }
    .news-content { flex: 1; min-width: 0; }
    .news-name { font-size: 0.78rem; font-weight: 700; color: var(--text); }
    .news-action { font-size: 0.72rem; color: var(--muted); margin-top: 2px; line-height: 1.3; }

    /* ── Status bar ───────────────────────────────── */
    .error-bar {
      background: #fff0f1; color: var(--red); border: 1px solid #ffcdd0;
      border-radius: 10px; padding: 10px 16px; font-size: 0.8rem;
      margin: 0 28px; display: none;
    }
    .error-bar.show { display: block; }

    /* ── Empty state ─────────────────────────────── */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 40px 20px;
      color: var(--muted); gap: 8px;
    }
    .empty-icon { font-size: 2.5rem; opacity: 0.25; }
    .empty-title { font-size: 0.85rem; font-weight: 600; }
    .empty-sub { font-size: 0.75rem; }

    /* ── Loading shimmer ─────────────────────────── */
    .shimmer {
      background: linear-gradient(90deg, var(--bg) 25%, var(--border) 50%, var(--bg) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Sales view ───────────────────────────────── */
    .sales-toolbar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .sales-search {
      flex: 1; min-width: 200px;
      padding: 9px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.85rem; font-family: inherit;
      color: var(--text); background: var(--white);
      outline: none; transition: border-color 0.15s;
    }
    .sales-search:focus { border-color: var(--red); }
    .sales-sort-group { display: flex; align-items: center; gap: 8px; }
    .sales-sort-label { font-size: 0.75rem; font-weight: 600; color: var(--muted); }
    .sales-sort-select {
      padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.82rem; font-family: inherit; color: var(--text);
      background: var(--white); outline: none; cursor: pointer;
      transition: border-color 0.15s;
    }
    .sales-sort-select:focus { border-color: var(--red); }
    .sales-count { font-size: 0.78rem; color: var(--muted); font-weight: 500; white-space: nowrap; }

    .sales-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    .sale-card {
      background: var(--white);
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 2px 10px rgba(30,38,64,.05);
      border: 1.5px solid var(--border);
      display: flex; align-items: center; gap: 14px;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .sale-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(30,38,64,.09);
      border-color: #d9dff0;
    }
    .sale-avatar {
      width: 46px; height: 46px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }
    .sale-info { flex: 1; min-width: 0; }
    .sale-name { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .sale-date { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
    .sale-extra { font-size: 0.72rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sale-premium {
      text-align: right; flex-shrink: 0;
    }
    .sale-premium-val {
      font-size: 1.15rem; font-weight: 900;
      color: var(--red);
    }
    .sale-premium-lbl { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="/nsl-logo.png" alt="National Security Life" style="width:160px; filter:brightness(0) invert(1);" />
  </div>



  <div class="nav-section">
    <div class="nav-item active" id="nav-leaderboard" onclick="switchView('leaderboard')"><span class="nav-icon">🏆</span> Leaderboard</div>
    <div class="nav-item" id="nav-sales" onclick="switchView('sales')"><span class="nav-icon">💼</span> Sales</div>
  </div>

  <div class="sidebar-footer">
    <span class="sidebar-footer-icon">☰</span>
    <span class="sidebar-footer-text">More</span>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">
        <span class="topbar-title-icon">🛡</span>
        Leaderboard for
      </div>
      <button class="period-pill" id="period-btn">
        <span id="period-label">Today</span> ▾
        <select id="period-select" onchange="onPeriodChange(this.value)">
          <option value="today" selected>Today</option>
          <option value="yesterday">Yesterday</option>
          <option value="week">This Week</option>
          <option value="month">This Month</option>
          <option value="year">This Year</option>
          <option value="custom">Custom…</option>
        </select>
      </button>
      <div id="custom-picker" style="display:none; align-items:center; gap:6px; background:#fff; border:1.5px solid var(--border); border-radius:10px; padding:5px 12px;">
        <input type="date" id="custom-from" style="border:none; outline:none; font-size:0.8rem; font-family:inherit; color:var(--text);" />
        <span style="color:var(--muted); font-size:0.8rem;">→</span>
        <input type="date" id="custom-to" style="border:none; outline:none; font-size:0.8rem; font-family:inherit; color:var(--text);" />
        <button onclick="applyCustomRange()" style="background:var(--red);color:#fff;border:none;border-radius:7px;padding:4px 10px;font-size:0.75rem;font-weight:700;cursor:pointer;">Apply</button>
      </div>
    </div>
    <div class="topbar-right">
      <div class="refresh-badge">
        <div class="pulse-dot"></div>
        <span id="last-updated">Loading…</span>
      </div>
<div class="avatar-ring" id="user-avatar">MA</div>
    </div>
  </div>

  <!-- Error bar -->
  <div class="error-bar" id="error-bar"></div>

  <!-- Sales View -->
  <div id="view-sales" style="display:none; padding:24px 28px; flex:1; flex-direction:column; gap:20px;">
    <div class="sales-toolbar">
      <input class="sales-search" id="sales-search" type="text" placeholder="Search by name…" oninput="filterSales()" />
      <div class="sales-sort-group">
        <span class="sales-sort-label">Sort by</span>
        <select class="sales-sort-select" id="sales-sort" onchange="filterSales()">
          <option value="date-desc">Newest first</option>
          <option value="date-asc">Oldest first</option>
          <option value="premium-desc">Highest premium</option>
          <option value="name-asc">Name A–Z</option>
        </select>
      </div>
      <div class="sales-count" id="sales-count"></div>
    </div>
    <div class="sales-grid" id="sales-grid"></div>
  </div>

  <!-- Content -->
  <div id="view-leaderboard" class="content">

    <!-- Left: podium + others -->
    <div class="podium-section">
      <!-- Top 3 podium cards -->
      <div class="podium-cards" id="podium-cards">
        <div class="podium-card rank-1"><div class="empty shimmer" style="height:160px;width:100%"></div></div>
        <div class="podium-card rank-2"><div class="empty shimmer" style="height:160px;width:100%"></div></div>
        <div class="podium-card rank-3"><div class="empty shimmer" style="height:160px;width:100%"></div></div>
      </div>

      <!-- Full rankings list -->
      <div class="others-panel" id="others-panel">
        <div class="others-header">
          <div class="others-title">🏅 All Rankings</div>
        </div>
        <div id="others-list" style="max-height:480px; overflow-y:auto;">
        </div>
      </div>
    </div>

    <!-- Right column -->
    <div class="right-col">
      <!-- Stat cards -->
      <div class="stat-cards">
        <div class="stat-card red">
          <div class="stat-card-val" id="stat-deals">—</div>
          <div class="stat-card-lbl">Deals</div>
        </div>
        <div class="stat-card dark">
          <div class="stat-card-val" id="stat-premium">—</div>
          <div class="stat-card-lbl">Order Value</div>
        </div>
      </div>


      <!-- News/Activity feed -->
      <div class="news-panel">
        <div class="news-header">
          <div class="news-title">Activity</div>
          <div class="news-show-all">Show all</div>
        </div>
        <div class="news-list" id="news-list">
          <div class="empty"><div class="empty-icon">📰</div><div class="empty-title">No activity yet</div></div>
        </div>
      </div>
    </div>

  </div><!-- end .content -->
</div><!-- end .main -->

<script>
// ── Helpers ────────────────────────────────────────────────────────────────
const COLORS = ['#ff4757','#ff6348','#f59e0b','#3b6cf6','#22c55e','#8b5cf6','#06b6d4','#ec4899','#14b8a6','#f97316'];
function colorFor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return COLORS[h % COLORS.length];
}
function initials(name) {
  return name.trim().split(/\s+/).slice(0,2).map(w => w[0]).join('').toUpperCase();
}
function cleanName(raw) {
  // strip leading @ and return only the first word (first name)
  return (raw || '').replace(/^@+/, '').trim().split(/\s+/)[0];
}
function fmtMoney(n) {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
  if (n >= 1000)    return '$' + (n/1000).toFixed(n%1000===0?0:1) + 'k';
  return '$' + Math.round(n).toLocaleString();
}
function todayStr()   { return new Date().toISOString().slice(0,10); }
function weekStart()  { const d=new Date(); d.setDate(d.getDate()-d.getDay()+1); return d.toISOString().slice(0,10); }
function monthStart() { return new Date().toISOString().slice(0,8)+'01'; }

// Normalize any date string to YYYY-MM-DD
function normalizeDate(raw) {
  if (!raw) return '';
  raw = raw.trim();
  // Already YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}/.test(raw)) return raw.slice(0,10);
  // MM/DD/YYYY or M/D/YYYY
  const m = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  // DD/MM/YYYY fallback attempt — try parsing
  const d = new Date(raw);
  if (!isNaN(d)) return d.toISOString().slice(0,10);
  return '';
}

// ── Sparkline SVG ──────────────────────────────────────────────────────────
function sparkline(points, color, w=100, h=40) {
  if (!points || points.length < 2) {
    const y = h/2;
    return `<polyline points="0,${y} ${w},${y}" fill="none" stroke="${color}" stroke-width="2" opacity="0.4"/>`;
  }
  const mn = Math.min(...points), mx = Math.max(...points);
  const range = mx - mn || 1;
  const xs = points.map((_,i) => (i/(points.length-1))*w);
  const ys = points.map(v => h - ((v-mn)/range)*(h-6) - 3);
  const pts = xs.map((x,i) => `${x},${ys[i]}`).join(' ');
  // gradient fill
  const id = 'g' + Math.random().toString(36).slice(2,7);
  return `
    <defs>
      <linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <polygon points="${pts} ${xs[xs.length-1]},${h} 0,${h}" fill="url(#${id})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
}

// ── CSV parser ─────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const header = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''));
  return lines.slice(1).map(line => {
    const cols=[]; let cur='', inQ=false;
    for (const ch of line) {
      if (ch==='"') inQ=!inQ;
      else if (ch===','&&!inQ) { cols.push(cur.trim()); cur=''; }
      else cur+=ch;
    }
    cols.push(cur.trim());
    const obj={};
    header.forEach((h,i) => obj[h]=cols[i]||'');
    return obj;
  }).filter(r => r[header[0]]);
}

// ── Aggregate ──────────────────────────────────────────────────────────────
function aggregate(rows, from, to) {
  if (!rows.length) return { agents:[], totalDeals:0, totalPremium:0 };
  const keys = Object.keys(rows[0]);
  const nameKey    = keys.find(k=>k==='submitted_by') || keys.find(k=>/name/i.test(k)) || keys[0];
  const dateKey    = keys.find(k=>k==='date_only')      || keys.find(k=>k==='date') || keys[1];
  const premiumKey = keys.find(k=>k==='total_premium') || keys.find(k=>/premium|amount|price|value/i.test(k)) || keys[2];

  // Debug: log first row's raw date and detected key
  if (rows[0]) console.log('[DEBUG] dateKey:', dateKey, '| raw date:', rows[0][dateKey], '| normalized:', normalizeDate(rows[0][dateKey]), '| from:', from, '| to:', to);

  const map={}, byDate={}; let totalDeals=0, totalPremium=0;

  rows.forEach(row => {
    const date=normalizeDate(row[dateKey]);
    if (!date||date<from||date>to) return;
    const name=cleanName(row[nameKey]); if (!name) return;
    const premium=parseFloat((row[premiumKey]||'0').replace(/[$,]/g,''))||0;

    if (!map[name]) map[name]={ name, deals:0, premium:0, dailyDeals:{} };
    map[name].deals++;
    map[name].premium+=premium;
    map[name].dailyDeals[date]=(map[name].dailyDeals[date]||0)+1;
    totalDeals++; totalPremium+=premium;

    // for news: collect most recent events
    const tsKey = keys.find(k=>k==='timestamp')||'';
    const ts = tsKey ? (row[tsKey]||'') : '';
    if (!byDate[date]) byDate[date]=[];
    byDate[date].push({ name, premium, ts });
  });

  const agents = Object.values(map).sort((a,b)=>b.deals-a.deals||b.premium-a.premium);
  return { agents, totalDeals, totalPremium, byDate };
}

// ── Period state ───────────────────────────────────────────────────────────
let currentPeriod = 'today';
let customFrom = '', customTo = '';
let allRows = [];

function yesterdayStr() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0,10);
}
function yearStart() { return new Date().getFullYear() + '-01-01'; }

function getPeriodRange(period) {
  const today = todayStr();
  switch(period) {
    case 'today':     return [today, today];
    case 'yesterday': return [yesterdayStr(), yesterdayStr()];
    case 'week':      return [weekStart(), today];
    case 'month':     return [monthStart(), today];
    case 'year':      return [yearStart(), today];
    case 'custom':    return [customFrom || today, customTo || today];
    default:          return [today, today];
  }
}

function onPeriodChange(val) {
  const picker = document.getElementById('custom-picker');
  if (val === 'custom') {
    picker.style.display = 'flex';
    // pre-fill with current period range so user has a sensible starting point
    const [f, t] = getPeriodRange(currentPeriod === 'custom' ? 'week' : currentPeriod);
    document.getElementById('custom-from').value = f;
    document.getElementById('custom-to').value   = t;
    return; // wait for Apply
  }
  picker.style.display = 'none';
  currentPeriod = val;
  const labels = { today:'Today', yesterday:'Yesterday', week:'This Week', month:'This Month', year:'This Year' };
  document.getElementById('period-label').textContent = labels[val];
  renderAll(allRows);
}

function applyCustomRange() {
  customFrom = document.getElementById('custom-from').value;
  customTo   = document.getElementById('custom-to').value;
  if (!customFrom || !customTo) return;
  if (customFrom > customTo) { [customFrom, customTo] = [customTo, customFrom]; }
  currentPeriod = 'custom';
  document.getElementById('period-label').textContent =
    customFrom === customTo ? customFrom : customFrom + ' → ' + customTo;
  renderAll(allRows);
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderAll(rows) {
  const [from, to] = getPeriodRange(currentPeriod);
  const data = aggregate(rows, from, to);

  // Stats
  document.getElementById('stat-deals').textContent   = data.totalDeals.toLocaleString();
  document.getElementById('stat-premium').textContent = fmtMoney(data.totalPremium);


  // Podium (top 3)
  renderPodium(data.agents.slice(0,3), from, to);

  // Full rankings list
  renderOthers(data.agents);

  // News
  renderNews(data.byDate || {});
}

function agentSparkPoints(agent, from, to) {
  // build daily series from dailyDeals
  const days=[]; let d=new Date(from);
  const end=new Date(to);
  while(d<=end){ days.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  return days.map(dt => agent.dailyDeals[dt]||0);
}

const RANK_COLORS = ['#f59e0b','#ff4757','#3b6cf6'];
const RANK_MEDAL  = ['🥇','🥈','🥉'];
const RANK_BADGE  = ['badge-gray','badge-red','badge-blue'];
const RANK_TEXTS  = ['Top Advisor','Just closed a deal!','On a roll'];

function renderPodium(agents, from, to) {
  const el = document.getElementById('podium-cards');
  if (!agents.length) {
    el.innerHTML = [1,2,3].map(i => `
      <div class="podium-card rank-${i}">
        <div class="empty"><div class="empty-icon">🏆</div><div class="empty-title">No data</div></div>
      </div>`).join('');
    return;
  }
  el.innerHTML = agents.map((agent, i) => {
    const color  = colorFor(agent.name);
    const pts    = agentSparkPoints(agent, from, to);
    const spark  = sparkline(pts, RANK_COLORS[i] || '#3b6cf6');
    const rankCls= `rank-${i+1}`;
    return `
      <div class="podium-card ${rankCls}">
        <div class="podium-medal">${RANK_MEDAL[i]}</div>
        <div class="podium-avatar" style="background:${color}">${initials(agent.name)}</div>
        <div class="podium-name">${agent.name}</div>
        <div class="podium-badge ${RANK_BADGE[i]}">${RANK_TEXTS[i]}</div>
        <svg class="podium-chart" viewBox="0 0 100 40" preserveAspectRatio="none">${spark}</svg>
        <div class="podium-stat">${agent.deals}</div>
        <div class="podium-stat-label">Closed Deals</div>
        <div class="podium-premium">${fmtMoney(agent.premium)}</div>
        <div class="podium-actions">
          <button class="podium-btn">Profile</button>
          <button class="podium-btn">Message</button>
        </div>
      </div>`;
  }).join('');
}

function renderOthers(agents) {
  const el = document.getElementById('others-list');
  if (!agents.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">No data yet</div></div>`;
    return;
  }
  el.innerHTML = agents.map((agent, i) => {
    const rank  = i + 1;
    const color = colorFor(agent.name);
    const rankCls = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
    const medal   = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    return `
      <div class="rank-row">
        <div class="rank-num ${rankCls}">${medal}</div>
        <div class="rank-avatar" style="background:${color}">${initials(agent.name)}</div>
        <div class="rank-info">
          <div class="rank-name">${agent.name}</div>
          <div class="rank-premium">${fmtMoney(agent.premium)} premium</div>
        </div>
        <div class="rank-deals">
          <div class="rank-deals-num">${agent.deals}</div>
          <div class="rank-deals-lbl">Deals</div>
        </div>
      </div>`;
  }).join('');
}

function timeAgo(tsStr) {
  if (!tsStr) return '';
  const t = new Date(tsStr);
  if (isNaN(t)) return '';
  const diff = Math.floor((Date.now() - t) / 1000);
  if (diff < 60)   return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400)return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function renderNews(byDate) {
  const el = document.getElementById('news-list');
  const events = [];
  Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date, deals]) => {
    deals.forEach(d => events.push({ ...d, date }));
  });
  // Sort by timestamp descending if available
  events.sort((a,b) => {
    if (a.ts && b.ts) return new Date(b.ts) - new Date(a.ts);
    return 0;
  });
  if (!events.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📰</div><div class="empty-title">No activity yet</div></div>`;
    return;
  }
  el.innerHTML = events.slice(0,10).map(e => {
    const color = colorFor(e.name);
    const ago   = timeAgo(e.ts);
    return `
      <div class="news-item">
        <div class="news-avatar" style="background:${color}">${initials(e.name)}</div>
        <div class="news-content">
          <div class="news-name">${e.name}</div>
          <div class="news-action">Closed a deal! <span style="color:var(--red);font-weight:600">${fmtMoney(e.premium)}</span></div>
        </div>
        ${ago ? `<div style="font-size:0.7rem;color:var(--muted);flex-shrink:0;white-space:nowrap">${ago}</div>` : ''}
      </div>`;
  }).join('');
}

// ── Fetch ──────────────────────────────────────────────────────────────────
async function fetchData() {
  try {
    const res = await fetch('/api/data');
    if (!res.ok) {
      const err = await res.json().catch(()=>({error:res.statusText}));
      showError(err.error || 'Failed to load');
      return;
    }
    const csv = await res.text();
    if (csv.trim().startsWith('{')) { showError(JSON.parse(csv).error); return; }
    hideError();
    allRows = parseCSV(csv);
    renderAll(allRows);
    document.getElementById('last-updated').textContent = 'Live · ' + new Date().toLocaleTimeString();
  } catch(e) { showError('Cannot reach server: ' + e.message); }
}

function showError(msg) {
  const el = document.getElementById('error-bar');
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('error-bar').classList.remove('show');
}

fetchData();
setInterval(fetchData, 60_000);

// ── View switching ─────────────────────────────────────────────────────────
function switchView(view) {
  const isLeaderboard = view === 'leaderboard';
  document.getElementById('view-leaderboard').style.display = isLeaderboard ? 'grid' : 'none';
  document.getElementById('view-sales').style.display       = isLeaderboard ? 'none' : 'flex';
  document.getElementById('nav-leaderboard').classList.toggle('active', isLeaderboard);
  document.getElementById('nav-sales').classList.toggle('active', !isLeaderboard);
  document.querySelector('.topbar-title').innerHTML = isLeaderboard
    ? '<span class="topbar-title-icon">🛡</span> Leaderboard for'
    : '<span class="topbar-title-icon">💼</span> Sales';
  document.getElementById('period-btn').style.display = isLeaderboard ? '' : 'none';
  if (!isLeaderboard) renderSales(allRows);
}

// ── Sales rendering ────────────────────────────────────────────────────────
function renderSales(rows) {
  filterSales(rows);
}

function filterSales(rowsArg) {
  const rows = rowsArg instanceof Array ? rowsArg : allRows;
  if (!rows.length) {
    document.getElementById('sales-grid').innerHTML =
      `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">💼</div><div class="empty-title">No sales data yet</div></div>`;
    return;
  }

  const keys       = Object.keys(rows[0]);
  const nameKey    = keys.find(k=>k==='submitted_by')  || keys.find(k=>/name/i.test(k))    || keys[0];
  const dateKey    = keys.find(k=>k==='date')           || keys.find(k=>/date/i.test(k))    || keys[1];
  const premiumKey = keys.find(k=>k==='total_premium')  || keys.find(k=>/premium|amount|price|value/i.test(k)) || keys[2];
  const policyKey  = keys.find(k=>k==='policy_type');

  const query = (document.getElementById('sales-search')?.value || '').toLowerCase();
  const sort  = document.getElementById('sales-sort')?.value || 'date-desc';

  let filtered = rows.filter(r => {
    const name = cleanName(r[nameKey]).toLowerCase();
    return !query || name.includes(query);
  });

  filtered.sort((a, b) => {
    if (sort === 'date-desc')    return (normalizeDate(b[dateKey])||'').localeCompare(normalizeDate(a[dateKey])||'');
    if (sort === 'date-asc')     return (normalizeDate(a[dateKey])||'').localeCompare(normalizeDate(b[dateKey])||'');
    if (sort === 'premium-desc') {
      const pa = parseFloat((a[premiumKey]||'0').replace(/[$,]/g,'')) || 0;
      const pb = parseFloat((b[premiumKey]||'0').replace(/[$,]/g,'')) || 0;
      return pb - pa;
    }
    if (sort === 'name-asc')     return (cleanName(a[nameKey])||'').localeCompare(cleanName(b[nameKey])||'');
    return 0;
  });

  document.getElementById('sales-count').textContent =
    `${filtered.length} deal${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    document.getElementById('sales-grid').innerHTML =
      `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div class="empty-title">No results for "${query}"</div></div>`;
    return;
  }

  document.getElementById('sales-grid').innerHTML = filtered.map(row => {
    const name    = cleanName(row[nameKey]) || '—';
    const dateRaw = (row[dateKey] || '').trim();
    const premium = parseFloat((row[premiumKey]||'0').replace(/[$,]/g,'')) || 0;
    const policy  = policyKey ? (row[policyKey] || '') : '';
    const color   = colorFor(name);

    const normalized = normalizeDate(dateRaw);
    const dateFmt = normalized
      ? new Date(normalized + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
      : '—';

    const extra = policy;

    return `
      <div class="sale-card">
        <div class="sale-avatar" style="background:${color}">${initials(name)}</div>
        <div class="sale-info">
          <div class="sale-name">${name}</div>
          <div class="sale-date">📅 ${dateFmt}</div>
          ${extra ? `<div class="sale-extra">${extra}</div>` : ''}
        </div>
        <div class="sale-premium">
          <div class="sale-premium-val">${fmtMoney(premium)}</div>
          <div class="sale-premium-lbl">Premium</div>
        </div>
      </div>`;
  }).join('');
}
</script>
</body>
